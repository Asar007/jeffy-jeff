<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — NRI Bridge India</title>
<meta name="description" content="Reset your NRI Bridge India account password.">
<link rel="icon" type="image/png" href="NRI-BRIDGE-INDIA_LOGO-WHITE-PNG.png">
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<nav></nav>
<script src="nav.js"></script>

<main class="auth-page">
  <div class="auth-card" id="forgotCard">

    <div class="auth-logo">
      <img src="NRI-BRIDGE-INDIA_LOGO-WHITE-PNG.png" alt="NRI Bridge India" width="200" height="200">
    </div>

    <h1 class="auth-heading">Forgot Password?</h1>
    <p class="auth-subheading">Enter your email and we'll send you a link to reset your password.</p>

    <form id="forgotForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        <div class="form-error" id="emailError">Please enter a valid email address</div>
      </div>

      <button type="submit" class="btn-auth" id="submitBtn">Send Reset Link</button>
    </form>

    <div class="auth-footer" style="margin-top:24px;">
      Remembered it? <a href="/login">Back to sign in</a>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
(function() {
  'use strict';

  var form = document.getElementById('forgotForm');
  var emailInput = document.getElementById('email');
  var submitBtn = document.getElementById('submitBtn');
  var card = document.getElementById('forgotCard');

  emailInput.addEventListener('input', function() {
    this.classList.remove('error');
    document.getElementById('emailError').classList.remove('visible');
  });

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    var email = emailInput.value.trim();
    if (!email || !emailInput.validity.valid) {
      emailInput.classList.add('error');
      document.getElementById('emailError').classList.add('visible');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';

    // Call our custom Edge Function so the email comes from nribridgeindia.com
    // with the link target also on nribridgeindia.com (no supabase.co URL).
    var fnUrl = window.NRI_SUPABASE_URL + '/functions/v1/send-password-reset';
    try {
      await fetch(fnUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + window.NRI_SUPABASE_ANON_KEY,
          'apikey': window.NRI_SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({ email: email }),
      });
    } catch (e) {
      console.error('Reset email request failed (suppressed for user):', e);
    }

    // Show success regardless to avoid leaking which emails exist.
    card.innerHTML =
      '<div class="auth-success">' +
        '<div class="success-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>' +
        '<h3>Check Your Email</h3>' +
        '<p>If an account exists for <strong>' + email.replace(/[<>&"']/g, '') + '</strong>, ' +
        'we’ve sent a password reset link. It may take a minute to arrive — check your spam folder if you don’t see it.</p>' +
        '<p style="margin-top:20px;"><a href="/login" class="form-link">Back to sign in</a></p>' +
      '</div>';
  });

})();
</script>

</body>
</html>
