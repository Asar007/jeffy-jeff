<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — NRI Bridge India</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<!-- NAV -->
<nav></nav>
<script src="nav.js"></script>

<main class="auth-page">
  <div class="auth-card" id="signupCard">

    <div class="auth-logo">
      <img src="NRI-BRIDGE-INDIA_LOGO-WHITE-PNG.png" alt="NRI Bridge India">
    </div>

    <h1 class="auth-heading">Create Your Account</h1>
    <p class="auth-subheading">Sign up to start managing your properties</p>

    <form id="signupForm" novalidate>

      <div class="form-group">
        <label class="form-label" for="fullName">Full Name</label>
        <input type="text" id="fullName" class="form-input" placeholder="Enter your full name" required>
        <div class="form-error" id="nameError">Please enter your full name</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        <div class="form-error" id="emailError">Please enter a valid email address</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="phone">Phone Number</label>
        <div class="phone-input-group">
          <select class="phone-prefix" id="phonePrefix">
            <option value="+1">+1 (US)</option>
            <option value="+44">+44 (UK)</option>
            <option value="+971">+971 (UAE)</option>
            <option value="+65">+65 (SG)</option>
            <option value="+1-CA">+1 (CA)</option>
            <option value="+61">+61 (AU)</option>
            <option value="+91" selected>+91 (IN)</option>
          </select>
          <input type="tel" id="phone" class="form-input" placeholder="Phone number" required>
        </div>
        <div class="form-error" id="phoneError">Please enter your phone number</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="country">Country of Residence</label>
        <select id="country" class="form-input" required>
          <option value="" disabled selected>Select your country</option>
          <option value="USA">USA</option>
          <option value="UK">UK</option>
          <option value="UAE">UAE</option>
          <option value="Singapore">Singapore</option>
          <option value="Canada">Canada</option>
          <option value="Australia">Australia</option>
          <option value="India">India</option>
          <option value="Germany">Germany</option>
          <option value="New Zealand">New Zealand</option>
          <option value="Malaysia">Malaysia</option>
        </select>
        <div class="form-error" id="countryError">Please select your country</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="form-input-icon">
          <input type="password" id="password" class="form-input" placeholder="Create a strong password" required>
          <button type="button" class="toggle-password" aria-label="Toggle password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="password-strength-bar"><div class="password-strength-fill" id="strengthFill"></div></div>
        <div class="password-strength-text" id="strengthText"></div>
        <div class="form-error" id="passwordError">Password must be at least 6 characters</div>
      </div>

      <button type="submit" class="btn-auth" id="submitBtn">Create Account</button>
    </form>

    <div class="auth-divider"><span>or sign up with</span></div>
    <button type="button" class="btn-social" id="googleBtn">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A11.96 11.96 0 0 0 1 12c0 1.94.46 3.77 1.18 5.39l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
(function() {
  'use strict';

  var form = document.getElementById('signupForm');
  var passwordInput = document.getElementById('password');

  // Toggle password
  document.querySelector('.toggle-password').addEventListener('click', function() {
    var isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    this.innerHTML = isHidden
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  });

  // Password strength
  passwordInput.addEventListener('input', function() {
    var val = this.value;
    var fill = document.getElementById('strengthFill');
    var text = document.getElementById('strengthText');
    fill.className = 'password-strength-fill';
    if (val.length === 0) { text.textContent = ''; return; }
    var hasNum = /\d/.test(val), hasSp = /[!@#$%^&*(),.?":{}|<>_\-+=\[\]\\\/`~;']/.test(val);
    if (val.length >= 8 && hasNum && hasSp) { fill.classList.add('strength-strong'); text.textContent = 'Strong'; text.style.color = '#4a6a2e'; }
    else if (val.length >= 6 && hasNum) { fill.classList.add('strength-medium'); text.textContent = 'Medium'; text.style.color = '#f0ad4e'; }
    else { fill.classList.add('strength-weak'); text.textContent = 'Weak'; text.style.color = '#dc3545'; }
  });

  // Clear errors on input
  document.querySelectorAll('.form-input').forEach(function(el) {
    el.addEventListener('input', function() {
      this.classList.remove('error');
      var err = this.closest('.form-group') && this.closest('.form-group').querySelector('.form-error');
      if (err) err.classList.remove('visible');
    });
  });

  function showError(inputEl, errorId, msg) {
    inputEl.classList.add('error');
    var el = document.getElementById(errorId);
    if (el) {
      if (msg) el.textContent = msg;
      el.classList.add('visible');
    }
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    var name = document.getElementById('fullName');
    var email = document.getElementById('email');
    var phone = document.getElementById('phone');
    var country = document.getElementById('country');
    var valid = true;

    document.querySelectorAll('.form-error').forEach(function(el) { el.classList.remove('visible'); });
    document.querySelectorAll('.form-input').forEach(function(el) { el.classList.remove('error'); });

    if (!name.value.trim()) { showError(name, 'nameError'); valid = false; }
    if (!email.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) { showError(email, 'emailError'); valid = false; }
    if (!phone.value.trim()) { showError(phone, 'phoneError'); valid = false; }
    if (!country.value) { showError(country, 'countryError'); valid = false; }
    if (passwordInput.value.length < 6) { showError(passwordInput, 'passwordError'); valid = false; }

    if (!valid) return;

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Creating Account\u2026';

    var prefix = document.getElementById('phonePrefix').value.replace('-CA', '');
    var formattedPhone = prefix + ' ' + phone.value.trim();

    // Supabase SignUp
    const { data, error } = await supabaseClient.auth.signUp({
      email: email.value.trim(),
      password: passwordInput.value,
      options: {
        emailRedirectTo: window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1) + 'auth-callback.html',
        data: {
          full_name: name.value.trim(),
          phone: formattedPhone,
          country: country.value
        }
      }
    });

    if (error) {
      btn.disabled = false;
      btn.textContent = 'Create Account';
      showError(email, 'emailError', error.message);
      return;
    }

    // Preserve plan param if present
    var urlParams = new URLSearchParams(window.location.search);
    var planParam = urlParams.get('plan');
    var loginUrl = 'login.html' + (planParam ? '?plan=' + planParam : '');

    var card = document.getElementById('signupCard');
    card.innerHTML =
      '<div class="auth-success">' +
        '<div class="success-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>' +
        '<h3>Account Created!</h3>' +
        '<p>Welcome, ' + name.value.trim().split(' ')[0] + '! Please check your email to verify your account, or log in.</p>' +
      '</div>';

    setTimeout(function() {
      window.location.href = loginUrl;
    }, 2500);
  });

  document.getElementById('googleBtn').addEventListener('click', async function() {
    let basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
    if (!basePath.endsWith('/')) basePath += '/';
    const redirectPath = window.location.origin + basePath + 'propnri-saas-site.html';
    
    const { error } = await supabaseClient.auth.signInWithOAuth({ 
      provider: 'google',
      options: {
        redirectTo: redirectPath
      }
    });
    if (error) console.error("Error logging in with Google:", error.message);
  });

})();
</script>

</body>
</html>
