<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Quote Builder — NRI Bridge India</title>
<meta name="description" content="Build a custom service quote for your Indian property, vehicle, parental care, or legal needs. Select exactly the services you need and request a personalized quotation.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .qb-page{display:grid;grid-template-columns:1fr 320px;gap:32px;max-width:1140px;margin:0 auto;align-items:start}
  .qb-accordion{margin-bottom:16px;border-radius:var(--radius-lg);overflow:hidden;border:1.5px solid rgba(0,0,0,0.06);background:var(--white)}
  .qb-acc-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;cursor:pointer;transition:background 0.3s;user-select:none}
  .qb-acc-header:hover{background:rgba(74,106,46,0.03)}
  .qb-acc-header.open{background:rgba(74,106,46,0.04);border-bottom:1px solid rgba(0,0,0,0.06)}
  .qb-acc-left{display:flex;align-items:center;gap:14px}
  .qb-acc-icon{width:36px;height:36px;border-radius:10px;background:rgba(74,106,46,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .qb-acc-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;color:var(--text-dark)}
  .qb-acc-count{font-size:0.72rem;font-weight:600;color:var(--green-pop);background:rgba(74,106,46,0.1);padding:2px 10px;border-radius:var(--radius-pill)}
  .qb-acc-arrow{font-size:0.7rem;color:var(--text-mid);transition:transform 0.3s}
  .qb-acc-header.open .qb-acc-arrow{transform:rotate(180deg)}
  .qb-acc-body{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
  .qb-acc-body.open{max-height:8000px}
  .qb-acc-inner{padding:20px 24px}
  .qb-add-btn{width:100%;padding:12px;border:2px dashed rgba(74,106,46,0.25);border-radius:var(--radius-md);background:transparent;cursor:pointer;font-family:inherit;font-size:0.85rem;color:var(--green-pop);font-weight:600;transition:all 0.3s}
  .qb-add-btn:hover{background:rgba(74,106,46,0.04);border-color:var(--green-pop)}
  .qb-item{background:var(--bg-cream);border-radius:var(--radius-md);padding:20px;margin-bottom:16px;border:1px solid rgba(0,0,0,0.06)}
  .qb-item-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .qb-item-title{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:600;color:var(--text-dark)}
  .qb-item-remove{padding:4px 12px;border:1px solid rgba(220,53,69,0.3);border-radius:var(--radius-sm);background:transparent;cursor:pointer;color:#dc3545;font-size:0.72rem;font-weight:500;font-family:inherit;transition:all 0.3s}
  .qb-item-remove:hover{background:rgba(220,53,69,0.06)}
  .qb-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  .qb-field label{display:block;font-size:0.78rem;font-weight:600;color:var(--text-mid);margin-bottom:4px}
  .qb-field input,.qb-field select,.qb-field textarea{width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,0.1);border-radius:var(--radius-sm);font-family:inherit;font-size:0.85rem;color:var(--text-dark);background:var(--white);transition:border-color 0.3s}
  .qb-field input:focus,.qb-field select:focus,.qb-field textarea:focus{outline:none;border-color:var(--green-pop);box-shadow:0 0 0 3px rgba(74,106,46,0.08)}
  .qb-field textarea{resize:vertical;min-height:60px}
  .qb-svc-section{border-top:1px solid rgba(0,0,0,0.06);padding-top:14px}
  .qb-svc-section-title{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-mid);margin-bottom:12px}
  .qb-svc-group{margin-bottom:16px}
  .qb-svc-group-title{font-size:0.78rem;font-weight:600;color:var(--green-pop);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .qb-svc-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;margin-bottom:6px;background:var(--white);border:1.5px solid rgba(0,0,0,0.06);border-radius:var(--radius-md);cursor:pointer;transition:all 0.25s}
  .qb-svc-row:hover{border-color:rgba(74,106,46,0.25);background:rgba(74,106,46,0.02);box-shadow:0 2px 8px rgba(74,106,46,0.06)}
  .qb-svc-row.checked{border-color:var(--green-pop);background:rgba(74,106,46,0.04)}
  .qb-svc-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--green-pop);cursor:pointer;flex-shrink:0;margin-top:2px}
  .qb-svc-row label{font-size:0.82rem;color:var(--text-dark);cursor:pointer;line-height:1.4;font-weight:500}
  .qb-svc-row .svc-desc{font-size:0.72rem;color:var(--text-mid);display:block;margin-top:2px;font-weight:400}
  /* Summary sidebar */
  .qb-summary-col .qb-summary{position:sticky;top:100px;background:linear-gradient(135deg,#2d2f22 0%,#3a3c2c 50%,#3d5a28 100%);border-radius:var(--radius-lg);padding:28px;color:var(--text-light)}
  .qb-summary-col .qb-summary h4{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.1)}
  .qb-sum-items{min-height:40px;margin-bottom:14px}
  .qb-sum-item{padding:6px 0;font-size:0.8rem;border-bottom:1px solid rgba(255,255,255,0.05)}
  .qb-sum-item-label{font-weight:600;margin-bottom:2px}
  .qb-sum-item-svcs{font-size:0.72rem;opacity:0.65;line-height:1.5}
  .qb-sum-empty{text-align:center;padding:20px 0;font-size:0.82rem;opacity:0.4;font-style:italic}
  .qb-sum-count{display:flex;justify-content:space-between;padding-top:14px;margin-top:6px;border-top:1.5px solid rgba(255,255,255,0.15);font-size:0.95rem;font-weight:700}
  /* Addons in main column */
  .qb-addons-section{background:var(--white);border-radius:var(--radius-lg);padding:24px;border:1.5px solid rgba(0,0,0,0.06);margin-top:8px}
  .qb-addons-section h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;margin-bottom:14px;color:var(--text-dark)}
  .qb-addon-chips-light{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .qb-addon-chip-light{padding:7px 16px;border:1.5px solid rgba(0,0,0,0.1);border-radius:var(--radius-pill);background:transparent;color:var(--text-mid);font-family:inherit;font-size:0.78rem;cursor:pointer;transition:all 0.25s}
  .qb-addon-chip-light:hover{border-color:var(--green-pop);color:var(--green-pop)}
  .qb-addon-chip-light.selected{background:rgba(74,106,46,0.1);border-color:var(--green-pop);color:var(--green-pop);font-weight:600}
  .qb-addon-input-light{display:flex;gap:8px}
  .qb-addon-input-light input{flex:1;padding:8px 14px;border:1.5px solid rgba(0,0,0,0.1);border-radius:var(--radius-pill);font-family:inherit;font-size:0.8rem;color:var(--text-dark);background:var(--bg-cream)}
  .qb-addon-input-light input:focus{outline:none;border-color:var(--green-pop)}
  .qb-addon-input-light button{width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.1);background:var(--bg-cream);color:var(--green-pop);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all 0.25s}
  .qb-addon-input-light button:hover{background:var(--green-pop);color:var(--white);border-color:var(--green-pop)}
  .qb-addon-tags-light{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .qb-addon-tag-light{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(74,106,46,0.1);border:1px solid rgba(74,106,46,0.25);border-radius:var(--radius-pill);font-size:0.72rem;color:var(--green-pop)}
  .qb-addon-tag-light button{background:none;border:none;color:var(--green-pop);cursor:pointer;font-size:0.85rem;padding:0;line-height:1;opacity:0.6}
  .qb-addon-tag-light button:hover{opacity:1}
  @media(max-width:900px){
    .qb-page{grid-template-columns:1fr}
    .qb-summary-col .qb-summary{position:static}
    .qb-fields{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<nav></nav>
<script src="nav.js"></script>

<section class="service-hero section-pad">
  <div class="section-tag">Customise</div>
  <h1>Build Your Custom Quote</h1>
  <p>Select exactly the services you need, add your details, and request a personalised quotation. Our team will respond within 24 hours.</p>
</section>

<section class="services section-pad" style="padding-top:0;">
  <div class="qb-page">
    <div class="qb-categories-col" id="qbCats"></div>
    <div class="qb-summary-col">
      <div class="qb-summary">
        <h4>Your Quote Summary</h4>
        <div class="qb-sum-items" id="qbSumItems"><div class="qb-sum-empty">Add items & select services to build your quote</div></div>
        <div class="qb-sum-count"><span>Services Selected</span><span id="qbSumCount">0</span></div>
        <div id="qbSumAddons" style="margin-top:10px"></div>
        <div style="margin-top:24px;display:flex;flex-direction:column;gap:10px">
          <a href="signup.html" id="qbRequestQuote" class="btn-hero" style="text-align:center;width:100%">Request Quote</a>
          <a href="#" id="qbWhatsApp" class="qb-whatsapp" target="_blank" rel="noopener">💬 Discuss on WhatsApp</a>
        </div>
      </div>
    </div>
  </div>
</section>

<footer></footer>
<script src="footer.js"></script>

  parking:'<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--green-pop)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9"/></svg>',
  tag:'<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--green-pop)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>'
};
var GRP_ICONS = {0:'wrench',1:'truck',2:'clipboard',3:'shield',4:'parking',5:'tag'};

var CAT = {
  home:{
    label:'Home Management',icon:'home',itemLabel:'Property',addLabel:'+ Add Property',
    fields:[
      {key:'type',label:'Property Type',el:'select',opts:['Apartment','Independent House','Villa','Commercial']},
      {key:'city',label:'City',el:'input',ph:'e.g. Mumbai'},
      {key:'rent',label:'Expected/Current Rent (₹)',el:'input',inputType:'number',ph:'e.g. 25000'},
      {key:'age',label:'Property Age (years)',el:'input',inputType:'number',ph:'e.g. 5'},

    ],

      {id:'prop-maint',name:'Property Maintenance & Repairs',desc:'Routine and emergency maintenance, vetted vendors'},
      {id:'prop-insp',name:'Property Inspection & Reporting',desc:'Scheduled inspections with photo/video reports'},
      {id:'tenant-rel',name:'Tenant Relationship Management',desc:'Complaints, conflict resolution, move-in/out'},

      {id:'util-mgmt',name:'Utility & Bill Management',desc:'Electricity, water, gas, internet, society payments'}

    fields:[
      {key:'type',label:'Vehicle Type',el:'select',opts:['Car','SUV','Bike','Scooter']},
      {key:'model',label:'Make/Model',el:'input',ph:'e.g. Honda City'},

      {key:'city',label:'City',el:'input',ph:'e.g. Delhi'},

    ],
    serviceGroups:[
      {title:'Maintenance & Care',gIcon:0,services:[
        {id:'v-health',name:'Monthly Health Checks',desc:'Battery, tyres, fluids + photo/video report'},

var ADDONS_LIST=['Airport Pickup','Festival Prep','Puja / Event','Renovation','Insurance Claims','Bank Visit','Tenant Screening','Medical 2nd Opinion'];
var state={items:{home:[],vehicle:[],parental:[],legal:[]},addons:[],counters:{home:0,vehicle:0,parental:0,legal:0}};

function init(){
  var root=document.getElementById('qbCats');
  var html='';
  for(var cat in CAT){
    var c=CAT[cat];
    html+='<div class="qb-accordion" data-cat="'+cat+'">'+
      '<div class="qb-acc-header" onclick="toggleAcc(this)">'+
        '<div class="qb-acc-left"><span class="qb-acc-icon">'+(ICONS[c.icon]||'')+'</span><span class="qb-acc-title">'+c.label+'</span>'+
        '<span class="qb-acc-count" id="count-'+cat+'">0 selected</span></div>'+
        '<span class="qb-acc-arrow">▼</span></div>'+
      '<div class="qb-acc-body" id="body-'+cat+'"><div class="qb-acc-inner">'+
        '<div id="items-'+cat+'"></div>'+
        '<button class="qb-add-btn" onclick="addItem(\''+cat+'\')">'+c.addLabel+'</button>'+
      '</div></div></div>';
  }
  // Addons section
  html+='<div class="qb-addons-section"><h3>Add-on Services (Optional)</h3>'+
    '<div class="qb-addon-chips-light" id="addonChips">'+
    ADDONS_LIST.map(function(a){return '<button class="qb-addon-chip-light" data-addon="'+a+'" onclick="toggleAddon(this)">'+a+'</button>'}).join('')+
    '</div><div class="qb-addon-input-light"><input type="text" id="customAddonInput" placeholder="Add custom service...">'+
    '<button onclick="addCustomAddon()">+</button></div>'+
    '<div class="qb-addon-tags-light" id="addonTags"></div></div>';
  root.innerHTML=html;
}

window.toggleAcc=function(header){
  var isOpen=header.classList.contains('open');
  header.classList.toggle('open');
  var body=header.nextElementSibling;
  body.classList.toggle('open');
};

window.addItem=function(cat){
  var c=CAT[cat];
  state.counters[cat]++;
  var id=state.counters[cat];
  var item={id:id,data:{},services:[]};
  state.items[cat].push(item);
  var container=document.getElementById('items-'+cat);
  var div=document.createElement('div');
  div.className='qb-item';div.id='item-'+cat+'-'+id;

  var fieldsHtml='<div class="qb-fields">';
  c.fields.forEach(function(f){
    var spanAttr=f.span?' style="grid-column:span '+f.span+'"':'';
    fieldsHtml+='<div class="qb-field"'+spanAttr+'><label>'+f.label+'</label>';
    if(f.el==='select'){
      fieldsHtml+='<select data-cat="'+cat+'" data-id="'+id+'" data-key="'+f.key+'" onchange="updateField(this)">';
      f.opts.forEach(function(o){fieldsHtml+='<option value="'+o+'">'+o+'</option>'});
      fieldsHtml+='</select>';
    } else if(f.el==='textarea'){
      fieldsHtml+='<textarea data-cat="'+cat+'" data-id="'+id+'" data-key="'+f.key+'" placeholder="'+(f.ph||'')+'" onchange="updateField(this)"></textarea>';
    } else {
      fieldsHtml+='<input type="'+(f.inputType||'text')+'" data-cat="'+cat+'" data-id="'+id+'" data-key="'+f.key+'" placeholder="'+(f.ph||'')+'" onchange="updateField(this)">';
    }
    fieldsHtml+='</div>';
  });
  fieldsHtml+='</div>';

  var svcsHtml='<div class="qb-svc-section">';
  if(cat==='legal'){
    svcsHtml+='<div class="qb-svc-section-title">This request will be quoted individually</div>';
  } else if(c.serviceGroups){
    svcsHtml+='<div class="qb-svc-section-title">Select Services for this '+c.itemLabel+'</div>';
    c.serviceGroups.forEach(function(g){
      svcsHtml+='<div class="qb-svc-group"><div class="qb-svc-group-title">'+(ICONS[GRP_ICONS[g.gIcon]]||'')+' '+g.title+'</div>';
      g.services.forEach(function(s){
        var uid=cat+'-'+id+'-'+s.id;
        svcsHtml+='<div class="qb-svc-row" onclick="var cb=this.querySelector(\'input\');if(event.target!==cb){cb.checked=!cb.checked;cb.dispatchEvent(new Event(\'change\'))}"><input type="checkbox" id="'+uid+'" data-cat="'+cat+'" data-id="'+id+'" data-svc="'+s.id+'" onchange="toggleSvc(this);this.closest(\'\'.qb-svc-row\'\').classList.toggle(\'checked\',this.checked)"><label for="'+uid+'">'+s.name+'<span class="svc-desc">'+s.desc+'</span></label></div>';
      });
      svcsHtml+='</div>';
    });
  } else if(c.services){
    svcsHtml+='<div class="qb-svc-section-title">Select Services for this '+c.itemLabel+'</div>';
    c.services.forEach(function(s){
      var uid=cat+'-'+id+'-'+s.id;
      svcsHtml+='<div class="qb-svc-row" onclick="var cb=this.querySelector(\'input\');if(event.target!==cb){cb.checked=!cb.checked;cb.dispatchEvent(new Event(\'change\'))}"><input type="checkbox" id="'+uid+'" data-cat="'+cat+'" data-id="'+id+'" data-svc="'+s.id+'" onchange="toggleSvc(this);this.closest(\'\'.qb-svc-row\'\').classList.toggle(\'checked\',this.checked)"><label for="'+uid+'">'+s.name+'<span class="svc-desc">'+s.desc+'</span></label></div>';
    });
  }
  svcsHtml+='</div>';

  div.innerHTML='<div class="qb-item-head"><span class="qb-item-title">'+(ICONS[c.icon]||'')+' '+c.itemLabel+' #'+id+'</span><button class="qb-item-remove" onclick="removeItem(\''+cat+'\','+id+')">Remove</button></div>'+fieldsHtml+svcsHtml;
  container.appendChild(div);

  // Set defaults for select fields
  c.fields.forEach(function(f){
    if(f.el==='select'){item.data[f.key]=f.opts[0]}
  });

  // Auto-open accordion
  var header=document.querySelector('.qb-accordion[data-cat="'+cat+'"] .qb-acc-header');
  if(!header.classList.contains('open')){header.classList.add('open');header.nextElementSibling.classList.add('open')}
  updateSummary();
};

window.removeItem=function(cat,id){
  var el=document.getElementById('item-'+cat+'-'+id);
  if(el)el.remove();
  state.items[cat]=state.items[cat].filter(function(i){return i.id!==id});
  updateSummary();
};

window.updateField=function(el){
  var cat=el.dataset.cat,id=parseInt(el.dataset.id),key=el.dataset.key;
  var item=state.items[cat].find(function(i){return i.id===id});
  if(item)item.data[key]=el.value;
  updateSummary();
};

window.toggleSvc=function(el){
  var cat=el.dataset.cat,id=parseInt(el.dataset.id),svc=el.dataset.svc;
  var item=state.items[cat].find(function(i){return i.id===id});
  if(!item)return;
  if(el.checked){if(item.services.indexOf(svc)===-1)item.services.push(svc)}
  else{var idx=item.services.indexOf(svc);if(idx>-1)item.services.splice(idx,1)}
  updateSummary();
};

window.toggleAddon=function(el){
  var addon=el.dataset.addon;
  var idx=state.addons.indexOf(addon);
  if(idx>-1){state.addons.splice(idx,1);el.classList.remove('selected')}
  else{state.addons.push(addon);el.classList.add('selected')}
  renderAddonTags();updateSummary();
};

window.addCustomAddon=function(){
  var input=document.getElementById('customAddonInput');
  var val=input.value.trim();
  if(val&&state.addons.indexOf(val)===-1){state.addons.push(val);renderAddonTags();updateSummary();input.value=''}
};
document.addEventListener('keydown',function(e){
  if(e.target.id==='customAddonInput'&&e.key==='Enter'){e.preventDefault();addCustomAddon()}
});

function renderAddonTags(){
  var c=document.getElementById('addonTags');
  c.innerHTML=state.addons.map(function(a){return '<span class="qb-addon-tag-light">'+a+'<button onclick="removeAddon(\''+a.replace(/'/g,"\\'")+'\')">&times;</button></span>'}).join('');
}
window.removeAddon=function(addon){
  var idx=state.addons.indexOf(addon);
  if(idx>-1)state.addons.splice(idx,1);
  var chip=document.querySelector('.qb-addon-chip-light[data-addon="'+addon+'"]');
  if(chip)chip.classList.remove('selected');
  renderAddonTags();updateSummary();
};

function getSvcName(cat,svcId){
  var c=CAT[cat];
  if(c.services){var s=c.services.find(function(s){return s.id===svcId});return s?s.name:svcId}
  if(c.serviceGroups){for(var g=0;g<c.serviceGroups.length;g++){var s=c.serviceGroups[g].services.find(function(s){return s.id===svcId});if(s)return s.name}}
  return svcId;
}

function getItemLabel(cat,item){
  var d=item.data;
  if(cat==='home')return (d.type||'Property')+' in '+(d.city||'—');
  if(cat==='vehicle')return (d.model||d.type||'Vehicle')+' ('+(d.reg||'—')+')';
  if(cat==='parental')return d.name||'Family Member';
  if(cat==='legal')return d.type||'Legal Request';
  return CAT[cat].itemLabel+' #'+item.id;
}

function updateSummary(){
  var sumEl=document.getElementById('qbSumItems');
  var countEl=document.getElementById('qbSumCount');
  var addonsEl=document.getElementById('qbSumAddons');
  var totalSvcs=0;
  var html='';

  for(var cat in state.items){
    state.items[cat].forEach(function(item){
      var svcCount=cat==='legal'?1:item.services.length;
      if(cat==='legal'||svcCount>0){
        totalSvcs+=svcCount;
        var label=getItemLabel(cat,item);
        var svcsStr='';
        if(cat==='legal'){svcsStr=item.data.desc||'Quote requested'}
        else{svcsStr=item.services.map(function(s){return getSvcName(cat,s)}).join(', ')||'No services selected'}
        html+='<div class="qb-sum-item"><div class="qb-sum-item-label">'+label+'</div><div class="qb-sum-item-svcs">'+svcsStr+'</div></div>';
      }
    });
    // Update accordion count
    var catCount=0;
    state.items[cat].forEach(function(i){catCount+=cat==='legal'?1:i.services.length});
    var countBadge=document.getElementById('count-'+cat);
    if(countBadge)countBadge.textContent=catCount+' selected';
  }

  if(!html)html='<div class="qb-sum-empty">Add items & select services to build your quote</div>';
  sumEl.innerHTML=html;
  countEl.textContent=totalSvcs;

  // Addons in summary
  if(state.addons.length>0){
    addonsEl.innerHTML='<div style="font-size:0.72rem;opacity:0.6;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08)"><strong>Add-ons:</strong> '+state.addons.join(', ')+'</div>';
  } else {addonsEl.innerHTML=''}

  updateLinks();
}

function updateLinks(){
  var params=[];
  for(var cat in state.items){
    state.items[cat].forEach(function(item,i){
      if(cat==='legal'||item.services.length>0){
        var prefix=cat+i;
        for(var k in item.data){if(item.data[k])params.push(prefix+'_'+k+'='+encodeURIComponent(item.data[k]))}
        if(cat!=='legal')params.push(prefix+'_svcs='+encodeURIComponent(item.services.join(',')));
      }
    });
  }
  if(state.addons.length>0)params.push('addons='+encodeURIComponent(state.addons.join(',')));
  var qs=params.length?'?'+params.join('&'):'';
  var session=JSON.parse(localStorage.getItem('nri_session')||'null');
  document.getElementById('qbRequestQuote').href=(session?'onboarding.html':'signup.html')+qs;

  var msg="Hi NRI Bridge India! I'd like a quote for:\n\n";
  for(var cat in state.items){
    state.items[cat].forEach(function(item){
      if(cat==='legal'||item.services.length>0){
        msg+='• '+getItemLabel(cat,item)+'\n';
        if(cat!=='legal'){item.services.forEach(function(s){msg+='  - '+getSvcName(cat,s)+'\n'})}
      }
    });
  }
  if(state.addons.length>0)msg+='\nAdd-ons: '+state.addons.join(', ');
  document.getElementById('qbWhatsApp').href='https://wa.me/91XXXXXXXXXX?text='+encodeURIComponent(msg);
}

init();
updateSummary();
})();
</script>
</body>
</html>
