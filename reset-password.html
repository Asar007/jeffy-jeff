<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — NRI Bridge India</title>
<link rel="icon" type="image/png" href="NRI-BRIDGE-INDIA_LOGO-WHITE-PNG.png">
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<nav></nav>
<script src="nav.js"></script>

<main class="auth-page">
  <div class="auth-card" id="resetCard">

    <div class="auth-logo">
      <img src="NRI-BRIDGE-INDIA_LOGO-WHITE-PNG.png" alt="NRI Bridge India" width="200" height="200">
    </div>

    <h1 class="auth-heading">Set a New Password</h1>
    <p class="auth-subheading" id="subheading">Verifying your reset link…</p>

    <form id="resetForm" novalidate style="display:none;">
      <div class="form-group">
        <label class="form-label" for="password">New Password</label>
        <div class="form-input-icon">
          <input type="password" id="password" class="form-input" placeholder="At least 6 characters" required autocomplete="new-password">
          <button type="button" class="toggle-password" aria-label="Toggle password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="form-error" id="passwordError">Password must be at least 6 characters</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter password" required autocomplete="new-password">
        <div class="form-error" id="confirmError">Passwords do not match</div>
      </div>

      <button type="submit" class="btn-auth" id="submitBtn">Update Password</button>
    </form>

    <div id="errorState" style="display:none; text-align:center; margin-top:20px;">
      <p style="color:#dc3545; margin-bottom:16px;" id="errorMessage"></p>
      <a href="/forgot-password" class="form-link">Request a new reset link</a>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
(function() {
  'use strict';

  var form = document.getElementById('resetForm');
  var subheading = document.getElementById('subheading');
  var card = document.getElementById('resetCard');
  var passwordInput = document.getElementById('password');
  var confirmInput = document.getElementById('confirmPassword');
  var submitBtn = document.getElementById('submitBtn');

  var recoveryReady = false;

  // Supabase emits PASSWORD_RECOVERY when the user lands here from a reset link.
  window.supabaseClient.auth.onAuthStateChange(function(event, session) {
    if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session && hasRecoveryHash())) {
      recoveryReady = true;
      showForm();
    }
  });

  function hasRecoveryHash() {
    return window.location.hash.indexOf('type=recovery') !== -1;
  }

  function showForm() {
    subheading.textContent = 'Choose a new password for your account.';
    form.style.display = 'block';
  }

  function showError(msg) {
    subheading.style.display = 'none';
    form.style.display = 'none';
    var err = document.getElementById('errorState');
    document.getElementById('errorMessage').textContent = msg;
    err.style.display = 'block';
  }

  // If no recovery hash AND no active session within a moment, show error.
  setTimeout(async function() {
    if (recoveryReady) return;
    const { data } = await window.supabaseClient.auth.getSession();
    if (data && data.session && hasRecoveryHash()) {
      recoveryReady = true;
      showForm();
    } else if (!hasRecoveryHash()) {
      showError('This page can only be opened from a password reset email link.');
    }
  }, 1200);

  // Toggle password visibility
  document.querySelector('.toggle-password').addEventListener('click', function() {
    var isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
  });

  [passwordInput, confirmInput].forEach(function(el) {
    el.addEventListener('input', function() {
      this.classList.remove('error');
      var err = this.closest('.form-group').querySelector('.form-error');
      if (err) err.classList.remove('visible');
    });
  });

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    var pw = passwordInput.value;
    var cpw = confirmInput.value;
    var valid = true;

    if (pw.length < 6) {
      passwordInput.classList.add('error');
      document.getElementById('passwordError').classList.add('visible');
      valid = false;
    }
    if (pw !== cpw) {
      confirmInput.classList.add('error');
      document.getElementById('confirmError').classList.add('visible');
      valid = false;
    }
    if (!valid) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Updating…';

    const { error } = await window.supabaseClient.auth.updateUser({ password: pw });

    if (error) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Update Password';
      showError(error.message || 'Could not update password. Please request a new reset link.');
      return;
    }

    card.innerHTML =
      '<div class="auth-success">' +
        '<div class="success-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>' +
        '<h3>Password Updated</h3>' +
        '<p>Your password has been changed. Redirecting to sign in…</p>' +
      '</div>';

    await window.supabaseClient.auth.signOut();
    setTimeout(function() { window.location.href = '/login'; }, 1800);
  });

})();
</script>

</body>
</html>
