<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — NRI Bridge India</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>

  <!-- ═══ NAV ═══ -->
  <nav>
    <div class="nav-logo"><a href="propnri-saas-site.html"><img src="NRI-BRIDGE-INDIA_LOGO-WHITE-PNG.png" alt="NRI Bridge India" style="height:80px;width:auto;display:block;"></a></div>
    <ul class="nav-links">
      <li><a href="propnri-saas-site.html">Home</a></li>
      <li><a href="propnri-saas-site.html#services">Services</a></li>
      <li><a href="propnri-saas-site.html#pricing">Pricing</a></li>
      <li><a href="propnri-saas-site.html#how">How It Works</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="login.html" class="btn-outline" style="border-color:rgba(255,255,255,0.6);opacity:1;">Log in</a>
      <a href="signup.html" class="btn-primary">Get Started</a>
    </div>
  </nav>

  <!-- ═══ AUTH PAGE ═══ -->
  <main class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <img src="NRI-BRIDGE-INDIA_LOGO-WHITE-PNG.png" alt="NRI Bridge India">
      </div>

      <h1 class="auth-heading">Welcome Back</h1>
      <p class="auth-subheading">Sign in to manage your properties and services</p>

      <form id="loginForm" novalidate>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="form-input-icon">
            <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember / Forgot -->
        <div class="form-row">
          <label class="form-check">
            <input type="checkbox" id="remember" name="remember">
            Remember me
          </label>
          <a href="#" class="form-link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-auth" id="submitBtn">Sign In</button>

        <!-- Divider -->
        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <!-- Google -->
        <button type="button" class="btn-social" id="googleBtn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A11.96 11.96 0 0 0 1 12c0 1.94.46 3.77 1.18 5.07l3.66-2.98z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

      </form>

      <!-- Footer link -->
      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>

    </div>
  </main>

  <!-- ═══ JAVASCRIPT ═══ -->
  <script>
    // ── Toggle password visibility ──
    const toggleBtn = document.querySelector('.toggle-password');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    const eyeOpenPath = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    const eyeClosedPath = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';

    let passwordVisible = false;

    toggleBtn.addEventListener('click', function () {
      passwordVisible = !passwordVisible;
      passwordInput.type = passwordVisible ? 'text' : 'password';
      eyeIcon.innerHTML = passwordVisible ? eyeClosedPath : eyeOpenPath;
    });

    // ── Form validation & submission ──
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');

    function clearErrors() {
      form.querySelectorAll('.form-input').forEach(function (el) {
        el.classList.remove('error');
      });
    }

    function validate() {
      clearErrors();
      let valid = true;

      if (!emailInput.value.trim() || !emailInput.validity.valid) {
        emailInput.classList.add('error');
        valid = false;
      }
      if (!passwordInput.value.trim()) {
        passwordInput.classList.add('error');
        valid = false;
      }

      return valid;
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      if (!validate()) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in\u2026';

      // Local auth: check against localStorage users
      var email = emailInput.value.trim();
      var password = passwordInput.value;
      var users = JSON.parse(localStorage.getItem('nri_users') || '[]');
      var user = users.find(function(u) { return u.email === email && u.password === password; });

      setTimeout(function() {
        if (user) {
          // Store logged-in session
          localStorage.setItem('nri_session', JSON.stringify({ email: user.email, name: user.name }));

          var card = document.querySelector('.auth-card');
          card.innerHTML =
            '<div class="auth-success">' +
              '<div class="success-icon">' +
                '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' +
              '</div>' +
              '<h3>Welcome Back, ' + (user.name || 'User') + '!</h3>' +
              '<p>Signed in successfully. Redirecting\u2026</p>' +
            '</div>';

          // Check if a plan was selected before login
          var urlParams = new URLSearchParams(window.location.search);
          var planParam = urlParams.get('plan');

          setTimeout(function() {
            if (planParam) {
              // User came from a pricing CTA — send them to onboarding with plan pre-selected
              window.location.href = 'onboarding.html?plan=' + planParam;
            } else {
              // Normal login — always go to homepage
              window.location.href = 'propnri-saas-site.html';
            }
          }, 2000);
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
          passwordInput.classList.add('error');
          // Show inline error
          var existingErr = document.getElementById('loginError');
          if (!existingErr) {
            var errDiv = document.createElement('div');
            errDiv.id = 'loginError';
            errDiv.style.cssText = 'color:#dc3545;font-size:0.82rem;text-align:center;margin-bottom:16px;';
            errDiv.textContent = 'Invalid email or password. Don\u2019t have an account? Sign up first.';
            submitBtn.parentNode.insertBefore(errDiv, submitBtn);
          }
        }
      }, 600);
    });

    // ── Clear error state on input ──
    emailInput.addEventListener('input', function () {
      this.classList.remove('error');
      var err = document.getElementById('loginError');
      if (err) err.remove();
    });
    passwordInput.addEventListener('input', function () {
      this.classList.remove('error');
      var err = document.getElementById('loginError');
      if (err) err.remove();
    });
  </script>

</body>
</html>
