<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // If Supabase email verification params are present, go to the callback handler
    var params = new URLSearchParams(window.location.search);
    if (params.get('token_hash') || params.get('access_token')) {
      window.location.replace('auth-callback.html' + window.location.search + window.location.hash);
    } else if (window.location.hash.indexOf('access_token=') !== -1) {
      // Legacy OAuth fragment — forward to main site so supabase-client.js can pick it up
      window.location.replace('propnri-saas-site.html' + window.location.hash);
    } else {
      window.location.replace('propnri-saas-site.html');
    }
  </script>
</head>
<body>
  Redirecting to the homepage...
</body>
</html>
