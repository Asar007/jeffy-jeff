<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var params = new URLSearchParams(window.location.search);
    if (params.get('token_hash') || params.get('access_token')) {
      window.location.replace('/auth' + window.location.search + window.location.hash);
    } else if (window.location.hash.indexOf('access_token=') !== -1) {
      window.location.replace('/home' + window.location.hash);
    } else {
      window.location.replace('/home');
    }
  </script>
</head>
<body>
  Redirecting to the homepage...
</body>
</html>
